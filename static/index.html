                    <div>
                        <label style="font-size: 11px; color: var(--text-secondary);">Right (px)</label>
                        <input type="number" value="${block[paddingRightProp] || ''}" class="property-input"
                            onchange="updateResponsivePadding('paddingRight', this.value)" placeholder="0">
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-secondary);">Bottom (px)</label>
                        <input type="number" value="${block[paddingBottomProp] || ''}" class="property-input"
                            onchange="updateResponsivePadding('paddingBottom', this.value)" placeholder="0">
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-secondary);">Left (px)</label>
                        <input type="number" value="${block[paddingLeftProp] || ''}" class="property-input"
                            onchange="updateResponsivePadding('paddingLeft', this.value)" placeholder="0">
                    </div>
                </div>
            </div>`;
            return html;
        }

        function updateResponsivePadding(prop, value) {
            const mode = state.responsiveMode;
            // Para desktop usamos las propiedades base, para tablet/móvil usamos las específicas
            const propProp = mode === 'desktop' ? prop : `${prop}${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block) {
                block[propProp] = value;
                renderBlocks();
            }
        }

        function updateIconFontSize(value) {
            const mode = state.responsiveMode;
            const prop = mode === 'desktop' ? 'fontSize' : `fontSize${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block && block.type === 'icon') {
                block[prop] = value;
                renderBlocks();
            }
        }

        function updateHiddenProperty(value) {
            const mode = state.responsiveMode;
            const prop = `hidden${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block) {
                block[prop] = value;
                renderBlocks();
            }
        }

        function toggleHoverMode() {
            state.hoverMode = !state.hoverMode;
            renderProperties();
        }

        function updateColorProperty(prop, value) {
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block) {
                if (state.hoverMode) {
                    block[`hover${prop.charAt(0).toUpperCase() + prop.slice(1)}`] = value;
                } else {
                    block[prop] = value;
                }
                renderBlocks();
                renderProperties();
            }
        }

        function updateBlockProperty(prop, value) {
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block) {
                // Si es la dirección y el bloque es contenedor, guardar también en directionDesktop
                if (prop === 'direction' && block.type === 'container') {
                    block.direction = value;
                    block.directionDesktop = value;
                } else {
                    block[prop] = value;
                }
                renderBlocks();
                renderProperties();
            }
        }

        function findBlockById(blocks, id) {
            for (const block of blocks) {
                if (block.id === id) return block;
                if (block.type === 'container' && block.children) {
                    const found = findBlockById(block.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function addCardItem() {
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block && block.type === 'cards') {
                block.items.push({ title: 'Nueva Tarjeta', description: 'Descripción' });
                renderBlocks();
                renderProperties();
            }
        }

        function updateCardItem(idx, prop, value) {
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block && block.type === 'cards') {
                block.items[idx][prop] = value;
                renderBlocks();
                renderProperties();
            }
        }

        function deleteCardItem(idx) {
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block && block.type === 'cards') {
                block.items.splice(idx, 1);
                renderBlocks();
                renderProperties();
            }
        }

        function addCarouselSlide() {
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block && block.type === 'carousel') {
                block.slides.push({ title: 'Nuevo Slide', image: '', description: '' });
                renderBlocks();
                renderProperties();
            }
        }

        function updateCarouselSlide(idx, prop, value) {
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block && block.type === 'carousel') {
                block.slides[idx][prop] = value;
                renderBlocks();
                renderProperties();
            }
        }

        function deleteCarouselSlide(idx) {
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block && block.type === 'carousel') {
                block.slides.splice(idx, 1);
                renderBlocks();
                renderProperties();
            }
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const block = findBlockById(state.page.blocks, state.selectedBlockId);
                    if (block && block.type === 'image') {
                        block.src = e.target.result;
                        renderBlocks();
                        renderProperties();
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        function handleCarouselImageUpload(idx, event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const block = findBlockById(state.page.blocks, state.selectedBlockId);
                    if (block && block.type === 'carousel') {
                        block.slides[idx]['image'] = e.target.result;
                        renderBlocks();
                        renderProperties();
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        function openPreviewModal() {
            window.open('/preview', '_blank');
        }
        function renderBlockPreview(block) {
            const blockClass = `block-${block.id}`;
            const cssId = `css-preview-${block.id}`;
            let html = '';

            // Generar estilos responsive con media queries
            const generateResponsiveCSS = () => {
                let css = '';

                // Desktop (base) - Colores base
                let baseStyles = [];
                if (block.backgroundColor) baseStyles.push(`background: ${block.backgroundColor}`);
                if (block.textColor) baseStyles.push(`color: ${block.textColor}`);

                if (baseStyles.length > 0) {
                    css += `.${blockClass} { ${baseStyles.join('; ')}; } `;
                }

                // Dimensiones Desktop
                let desktopStyles = [];
                if (block.widthDesktop && block.widthDesktop !== '' && block.widthDesktop !== 'auto') desktopStyles.push(`width: ${block.widthDesktop}`);
                if (block.heightDesktop && block.heightDesktop !== '' && block.heightDesktop !== 'auto') desktopStyles.push(`height: ${block.heightDesktop}`);
                if (block.width && block.width !== '' && block.width !== 'auto') desktopStyles.push(`width: ${block.width}`);
                if (block.height && block.height !== '' && block.height !== 'auto') desktopStyles.push(`height: ${block.height}`);

                if (desktopStyles.length > 0) {
                    css += `.${blockClass} { ${desktopStyles.join('; ')}; } `;
                }

                // Tablet (769px - 1024px)
                let tabletStyles = [];
                if (block.widthTablet && block.widthTablet !== '' && block.widthTablet !== 'auto') tabletStyles.push(`width: ${block.widthTablet}`);
                if (block.heightTablet && block.heightTablet !== '' && block.heightTablet !== 'auto') tabletStyles.push(`height: ${block.heightTablet}`);

                if (tabletStyles.length > 0) {
                    css += `@media (max-width: 1024px) and (min-width: 769px) { .${blockClass} { ${tabletStyles.join('; ')}; } } `;
                }

                // Mobile (<= 768px)
                let mobileStyles = [];
                if (block.widthMobile && block.widthMobile !== '' && block.widthMobile !== 'auto') mobileStyles.push(`width: ${block.widthMobile}`);
                if (block.heightMobile && block.heightMobile !== '' && block.heightMobile !== 'auto') mobileStyles.push(`height: ${block.heightMobile}`);

                if (mobileStyles.length > 0) {
                    css += `@media (max-width: 768px) { .${blockClass} { ${mobileStyles.join('; ')}; } } `;
                }

                // Hover styles (al final para tener prioridad)
                if (block.hoverBackgroundColor || block.hoverTextColor) {
                    css += `.${blockClass}:hover { `;
                    if (block.hoverBackgroundColor) css += `background: ${block.hoverBackgroundColor} !important; `;
                    if (block.hoverTextColor) css += `color: ${block.hoverTextColor} !important; `;
                    css += `} `;
                }

                // Padding Desktop (base)
                if (block.paddingTop || block.paddingRight || block.paddingBottom || block.paddingLeft) {
                    css += `.${blockClass} { padding: ${block.paddingTop || 0}px ${block.paddingRight || 0}px ${block.paddingBottom || 0}px ${block.paddingLeft || 0}px; } `;
                }

                // Padding responsive - Tablet
                const paddingTopTablet = block.paddingTopTablet || block.paddingTop;
                const paddingRightTablet = block.paddingRightTablet || block.paddingRight;
                const paddingBottomTablet = block.paddingBottomTablet || block.paddingBottom;
                const paddingLeftTablet = block.paddingLeftTablet || block.paddingLeft;
                if (paddingTopTablet || paddingRightTablet || paddingBottomTablet || paddingLeftTablet) {
                    css += `@media (max-width: 1024px) and (min-width: 769px) { .${blockClass} { padding: ${paddingTopTablet || 0}px ${paddingRightTablet || 0}px ${paddingBottomTablet || 0}px ${paddingLeftTablet || 0}px; } } `;
                }

                // Padding responsive - Mobile
                const paddingTopMobile = block.paddingTopMobile || block.paddingTop;
                const paddingRightMobile = block.paddingRightMobile || block.paddingRight;
                const paddingBottomMobile = block.paddingBottomMobile || block.paddingBottom;
                const paddingLeftMobile = block.paddingLeftMobile || block.paddingLeft;
                if (paddingTopMobile || paddingRightMobile || paddingBottomMobile || paddingLeftMobile) {
                    css += `@media (max-width: 768px) { .${blockClass} { padding: ${paddingTopMobile || 0}px ${paddingRightMobile || 0}px ${paddingBottomMobile || 0}px ${paddingLeftMobile || 0}px; } } `;
                }

                return css;
            };

            // Generar dirección responsive para contenedores
            const generateDirectionCSS = () => {
                if (block.type !== 'container') return '';

                let css = '';

                // Dirección base (desktop)
                const baseDirection = block.directionDesktop || block.direction;
                if (baseDirection) {
                    css += `.${blockClass} { display: flex; flex-direction: ${baseDirection === 'horizontal' ? 'row' : 'column'}; gap: 12px; } `;
                } else {
                    css += `.${blockClass} { display: flex; flex-direction: column; gap: 12px; } `;
                }

                // Tablet (entre 769px y 1024px)
                if (block.directionTablet) {
                    css += `@media (min-width: 769px) and (max-width: 1024px) { .${blockClass} { flex-direction: ${block.directionTablet === 'horizontal' ? 'row' : 'column'}; } } `;
                }

                // Mobile (<= 768px)
                if (block.directionMobile) {
                    css += `@media (max-width: 768px) { .${blockClass} { flex-direction: ${block.directionMobile === 'horizontal' ? 'row' : 'column'}; } } `;
                }

                return css;
            };

            const responsiveCSS = generateResponsiveCSS();
            const directionCSS = generateDirectionCSS();
            const allCSS = responsiveCSS + directionCSS;

            if (block.type === 'container') {
                const childrenHtml = (block.children && block.children.length > 0)
                    ? block.children.map(child => renderBlockPreview(child)).join('')
                    : '';
                html = `<style id="${cssId}">${block.customCSS} ${allCSS}</style><div class="${blockClass}" style="background: ${block.backgroundColor || 'transparent'}; color: ${block.textColor || 'inherit'}; padding: 12px; border-radius: 4px; margin-bottom: 24px;">${childrenHtml}</div>`;
            } else {
                switch (block.type) {
                    case 'hero':
                        html = `<style id="${cssId}">${block.customCSS} ${allCSS}</style><div class="${blockClass}" style="background: ${block.backgroundColor}; color: ${block.textColor}; padding: 40px; border-radius: 4px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-bottom: 24px;"><h1 style="font-size: 36px; margin-bottom: 12px;">${escapeHTML(block.content)}</h1><p style="font-size: 18px;">${escapeHTML(block.subContent)}</p></div>`;
                        break;
                    case 'heading':
                        html = `<style id="${cssId}">${block.customCSS} ${allCSS}</style><h2 class="${blockClass}" style="margin-bottom: 16px;">${escapeHTML(block.content)}</h2>`;
                        break;
                    case 'paragraph':
                        html = `<style id="${cssId}">${block.customCSS} ${allCSS}</style><p class="${blockClass}" style="line-height: 1.8; margin-bottom: 16px;">${escapeHTML(block.content)}</p>`;
                        break;
                    case 'image':
                        html = block.src ? `<style id="${cssId}">${block.customCSS} ${allCSS}</style><img class="${blockClass}" src="${block.src}" alt="${block.alt}" style="border-radius: 4px; object-fit: cover; margin-bottom: 24px;">` : '';
                        break;
                    case 'icon':
                        // Para iconos, usamos fontSize del modo actual
                        const mode = state.responsiveMode;
                        const fontSizeProp = mode === 'desktop' ? 'fontSize' : `fontSize${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
                        const iconSize = block[fontSizeProp] || block.fontSize || '48';
                        const iconColor = block.color || '#2563eb';
                        let iconCSS = `${block.customCSS || ''}`;
                        if (block.paddingTop || block.paddingRight || block.paddingBottom || block.paddingLeft) {
                            iconCSS += ` padding: ${block.paddingTop || 0}px ${block.paddingRight || 0}px ${block.paddingBottom || 0}px ${block.paddingLeft || 0}px;`;
                        }
                        if (block.paddingTopTablet || block.paddingRightTablet || block.paddingBottomTablet || block.paddingLeftTablet) {
                            const pt = block.paddingTopTablet || block.paddingTop || '0';
                            const pr = block.paddingRightTablet || block.paddingRight || '0';
                            const pb = block.paddingBottomTablet || block.paddingBottom || '0';
                            const pl = block.paddingLeftTablet || block.paddingLeft || '0';
                            iconCSS += ` @media (max-width: 1024px) and (min-width: 769px) { .${blockClass} { padding: ${pt}px ${pr}px ${pb}px ${pl}px; } }`;
                        }
                        if (block.paddingTopMobile || block.paddingRightMobile || block.paddingBottomMobile || block.paddingLeftMobile) {
                            const pt = block.paddingTopMobile || block.paddingTop || '0';
                            const pr = block.paddingRightMobile || block.paddingRight || '0';
                            const pb = block.paddingBottomMobile || block.paddingBottom || '0';
                            const pl = block.paddingLeftMobile || block.paddingLeft || '0';
                            iconCSS += ` @media (max-width: 768px) { .${blockClass} { padding: ${pt}px ${pr}px ${pb}px ${pl}px; } }`;
                        }
                        html = `<style id="${cssId}">.${blockClass} { ${iconCSS} font-size: ${iconSize}px !important; color: ${iconColor} !important; display: inline-block !important; } </style><span class="${blockClass}">${block.emoji || '😀'}</span>`;
                        break;
                    case 'cards':
                        html = `<style id="${cssId}">${block.customCSS} ${allCSS}</style><div class="${blockClass}" style="display: grid; grid-template-columns: repeat(${Math.min(block.items.length, 3)}, 1fr); gap: 24px; margin-bottom: 24px;">${block.items.map(item => `<div style="border: 1px solid #e5e7eb; padding: 20px; border-radius: 4px;"><h3 style="margin-bottom: 8px; font-size: 18px;">${escapeHTML(item.title)}</h3><p>${escapeHTML(item.description)}</p></div>`).join('')}</div>`;
                        break;
                    case 'carousel':
                        html = `<style id="${cssId}">${block.customCSS} ${allCSS}</style><div class="${blockClass}" style="margin-bottom: 24px;"><style>.carousel-container { display: flex; gap: 16px; overflow-x: auto; padding: 16px 0; scroll-behavior: smooth; } .carousel-item { flex: 0 0 350px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); } .carousel-item img { width: 100%; height: 250px; object-fit: cover; } .carousel-item-content { padding: 16px; } .carousel-item h3 { margin-bottom: 8px; font-size: 18px; color: #1f2937; } .carousel-item p { color: #6b7280; font-size: 14px; }</style><div class="carousel-container">${block.slides.map(slide => `<div class="carousel-item">${slide.image ? `<img src="${slide.image}" alt="${slide.title}">` : '<div style="width: 100%; height: 250px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; color: #6b7280;">Sin imagen</div>'}<div class="carousel-item-content"><h3>${escapeHTML(slide.title)}</h3>${slide.description ? `<p>${escapeHTML(slide.description)}</p>` : ''}</div></div>`).join('')}</div></div>`;
                        break;
                    case 'button':
                        html = `<style id="${cssId}">${block.customCSS} ${allCSS}</style><a class="${blockClass}" href="${block.link}" style="display: inline-block; padding: 12px 24px; background: ${block.backgroundColor}; color: ${block.textColor}; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; text-decoration: none; margin-bottom: 16px;">${escapeHTML(block.text)}</a>`;
                        break;
                    case 'divider':
                        html = `<style id="${cssId}">${block.customCSS} ${allCSS}</style><hr class="${blockClass}" style="border: none; border-top: 1px solid ${block.borderColor || 'transparent'}; background: ${block.borderColor || 'transparent'}; margin: 32px 0;">`;
                        break;
                }
            }
            return html;
        }

        function closePreviewModal() {
            document.getElementById('previewModal').classList.remove('active');
        }

        async function savePage() {
            const pageData = {
                title: state.page.title,
                blocks: state.page.blocks,
                styles: state.page.styles,
                favicon: state.page.favicon,
                createdAt: new Date().toISOString()
            };
            try {
                const response = await fetch('/cms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pageData)
                });
                if (response.ok) showToast('Página guardada correctamente', 'success');
                else showToast('Error al guardar', 'error');
            } catch (error) {
                console.error('Error:', error);
                showToast('Error de conexión', 'error');
            }
        }

        // Template functions
        function openTemplatesModal() {
            document.getElementById('templatesModal').classList.add('active');
            loadTemplatesList();
        }

        function closeTemplatesModal() {
            document.getElementById('templatesModal').classList.remove('active');
        }

        async function loadTemplatesList() {
            const listEl = document.getElementById('templatesList');
            listEl.innerHTML = '<div class="loading">Cargando plantillas...</div>';
            
            try {
                const response = await fetch('/api/templates');
                const templates = await response.json();
                
                if (templates.length === 0) {
                    listEl.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 20px;">No hay plantillas guardadas</p>';
                    return;
                }
                
                listEl.innerHTML = templates.map(t => `
                    <div class="template-item" style="display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; background: white;">
                        <div>
                            <strong style="font-size: 14px;">${escapeHTML(t.name)}</strong>
                            <div style="font-size: 11px; color: var(--text-secondary);">${new Date(t.createdAt).toLocaleDateString()}</div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="toolbar-btn" onclick="loadTemplate(${t.id})" title="Cargar plantilla">📂 Cargar</button>
                            <button class="toolbar-btn" onclick="deleteTemplate(${t.id})" title="Eliminar plantilla" style="color: var(--danger);">🗑️</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                listEl.innerHTML = '<p style="text-align: center; color: var(--danger);">Error al cargar plantillas</p>';
                console.error('Error loading templates:', error);
            }
        }

        async function saveCurrentAsTemplate() {
            const nameInput = document.getElementById('templateNameInput');
            const name = nameInput.value.trim();
            
            if (!name) {
                showToast('Introduce un nombre para la plantilla', 'error');
                return;
            }
            
            const pageData = {
                title: state.page.title,
                blocks: state.page.blocks,
                styles: state.page.styles,
                favicon: state.page.favicon,
                createdAt: new Date().toISOString()
            };
            
            try {
                const response = await fetch('/api/templates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, ...pageData })
                });
                
                if (response.ok) {
                    showToast('Plantilla guardada correctamente', 'success');
                    nameInput.value = '';
                    loadTemplatesList();
                } else {
                    showToast('Error al guardar plantilla', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error de conexión', 'error');
            }
        }

        async function loadTemplate(id) {
            // Doble confirmación
            if (!confirm('¿Estás seguro de cargar esta plantilla? Se perderá todo el contenido actual.')) {
                return;
            }
            if (!confirm('⚠️ CONFIRMACIÓN: Esta acción reemplazará todo tu trabajo actual. ¿Continuar?')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/templates/${id}`);
                if (!response.ok) {
                    const error = await response.json();
                    showToast(`Error: ${error.error || 'Error al cargar plantilla'}`, 'error');
                    return;
                }
                
                const pageData = await response.json();
                console.log('Plantilla cargada:', pageData);
                
                state.page = {
                    title: pageData.title || '',
                    blocks: pageData.blocks || [],
                    styles: pageData.styles || state.page.styles,
                    favicon: pageData.favicon || ''
                };
                
                document.getElementById('siteTitle').value = pageData.title || '';
                
                if (pageData.favicon) {
                    let link = document.querySelector('link[rel="icon"]');
                    if (!link) {
                        link = document.createElement('link');
                        link.rel = 'icon';
                        document.head.appendChild(link);
                    }
                    link.href = pageData.favicon;
                    const preview = document.getElementById('faviconPreview');
                    if (preview) {
                        preview.src = pageData.favicon;
                        preview.style.display = 'block';
                    }
                }
                
                loadGlobalStyles();
                renderBlocks();
                closeTemplatesModal();
                showToast('Plantilla cargada correctamente', 'success');
            } catch (error) {
                console.error('Error loading template:', error);
                showToast(`Error de conexión: ${error.message}`, 'error');
            }
        }

        async function deleteTemplate(id) {
            if (!confirm('¿Estás seguro de eliminar esta plantilla? Esta acción no se puede deshacer.')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/templates/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('Plantilla eliminada correctamente', 'success');
                    loadTemplatesList();
                } else {
                    showToast('Error al eliminar plantilla', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error de conexión', 'error');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>

</html>
