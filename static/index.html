<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Visual - WordPress Clone</title>
    <link rel="stylesheet" href="static/styles.css">
    <link rel="icon" href="static/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="toolbar">
        <div class="toolbar-left">
            <div class="toolbar-title">📄 Editor Visual</div>
            <label for="siteTitle" class="toolbar-label">Título del sitio:</label>
            <input type="text" id="siteTitle" class="toolbar-input" placeholder="Título del sitio"
                onchange="updateSiteTitle(this.value)">
            <label for="siteFavicon" class="toolbar-label">Favicon:</label>
            <div class="favicon-input-container">
                <input type="file" id="siteFavicon" class="toolbar-input" accept="image/*"
                    onchange="updateSiteFavicon(event)" title="Subir Favicon">
                <img id="faviconPreview" class="favicon-preview" style="display: none;" alt="Favicon">
            </div>
            <div class="responsive-selector">
                <button class="responsive-btn" data-device="desktop" onclick="setResponsiveMode('desktop')"
                    title="Ordenador">🖥️</button>
                <button class="responsive-btn" data-device="tablet" onclick="setResponsiveMode('tablet')"
                    title="Tablet">📱</button>
                <button class="responsive-btn" data-device="mobile" onclick="setResponsiveMode('mobile')"
                    title="Móvil">📲</button>
            </div>
        </div>
        <div class="toolbar-right">
            <button class="toolbar-btn" id="templatesBtn">📋 Plantillas</button>
            <button class="toolbar-btn" id="goToWebBtn">Ir a la Web</button>
            <button class="toolbar-btn" id="previewBtn">👁️ Vistas</button>
            <button class="toolbar-btn primary" id="saveBtn">💾 Guardar</button>
        </div>
    </div>

    <div class="editor-container">
        <div class="sidebar-left">
            <div class="sidebar-title">Bloques</div>
            <button class="block-btn" draggable="true" data-block-type="container">📦 Contenedor</button>
            <button class="block-btn" draggable="true" data-block-type="hero">🎨 Hero</button>
            <button class="block-btn" draggable="true" data-block-type="paragraph">📝 Párrafo</button>
            <button class="block-btn" draggable="true" data-block-type="heading">📌 Encabezado</button>
            <button class="block-btn" draggable="true" data-block-type="image">🖼️ Imagen</button>
            <button class="block-btn" draggable="true" data-block-type="icon">😊 Icono</button>
            <button class="block-btn" draggable="true" data-block-type="cards">🎴 Tarjetas</button>
            <button class="block-btn" draggable="true" data-block-type="carousel">🎠 Carrusel</button>
            <button class="block-btn" draggable="true" data-block-type="button">🔘 Botón</button>
            <button class="block-btn" draggable="true" data-block-type="divider">─ Divisor</button>
        </div>

        <div class="canvas-wrapper">
            <div class="canvas">
                <div class="blocks-container" id="blocksContainer">
                    <div class="empty-state">
                        <p>Arrastra bloques aquí para comenzar</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="properties"
                    onclick="switchTab('properties')">Propiedades</button>
                <button class="tab-btn" data-tab="styles" onclick="switchTab('styles')">Estilos</button>
            </div>

            <div id="propertiesPanel" class="tab-content active">
                <div class="properties-title">Propiedades</div>
                <p style="color: var(--text-secondary); font-size: 13px;">Selecciona un bloque para editar</p>
            </div>

            <div id="stylesPanel" class="tab-content">
                <div class="properties-title">Estilos Globales</div>
                <div class="property-group">
                    <label class="property-label">Color Primario</label>
                    <div class="color-input">
                        <input type="color" id="primaryColor" value="#2563eb"
                            onchange="updateGlobalStyle('primaryColor', this.value)">
                        <input type="text" id="primaryColorText" value="#2563eb" class="property-input"
                            onchange="updateGlobalStyle('primaryColor', this.value)">
                    </div>
                </div>
                <div class="property-group">
                    <label class="property-label">Color de Fondo</label>
                    <div class="color-input">
                        <input type="color" id="backgroundColor" value="#ffffff"
                            onchange="updateGlobalStyle('backgroundColor', this.value)">
                        <input type="text" id="backgroundColorText" value="#ffffff" class="property-input"
                            onchange="updateGlobalStyle('backgroundColor', this.value)">
                    </div>
                </div>
                <div class="property-group">
                    <label class="property-label">Color de Texto</label>
                    <div class="color-input">
                        <input type="color" id="textColor" value="#1f2937"
                            onchange="updateGlobalStyle('textColor', this.value)">
                        <input type="text" id="textColorText" value="#1f2937" class="property-input"
                            onchange="updateGlobalStyle('textColor', this.value)">
                    </div>
                </div>
                <div class="property-group">
                    <label class="property-label">Fuente</label>
                    <select class="property-select" id="fontFamily"
                        onchange="updateGlobalStyle('fontFamily', this.value)">
                        <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Sistema</option>
                        <option value="Georgia, serif">Georgia</option>
                        <option value="'Courier New', monospace">Monospace</option>
                        <option value="'Arial', sans-serif">Arial</option>
                    </select>
                </div>
                <div class="property-group">
                    <label class="property-label">Ancho Máximo (px)</label>
                    <input type="number" id="maxWidth" value="900" class="property-input"
                        onchange="updateGlobalStyle('maxWidth', this.value)">
                </div>
                <div class="property-group">
                    <label class="property-label">Espaciado Página (px)</label>
                    <input type="number" id="padding" value="40" class="property-input"
                        onchange="updateGlobalStyle('padding', this.value)">
                </div>
                <div class="property-group">
                    <label class="property-label">CSS Personalizado Global</label>
                    <textarea class="property-textarea" id="globalCSS" placeholder="body { /* Tu CSS aquí */ }"
                        onchange="updateGlobalStyle('globalCSS', this.value)"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="previewModal">
        <div class="modal-content-preview" style="position: relative;">
            <button class="modal-close" onclick="closePreviewModal()">×</button>
            <h2 style="margin-bottom: 20px; text-align: center;">Vista Previa Responsive</h2>
            <div class="preview-container">
                <div class="preview-device desktop">
                    <div class="device-label">🖥️ Ordenador</div>
                    <div class="device-frame desktop-frame">
                        <div id="previewDesktop"></div>
                    </div>
                </div>
                <div class="preview-device tablet">
                    <div class="device-label">📱 Tablet</div>
                    <div class="device-frame tablet-frame">
                        <div id="previewTablet"></div>
                    </div>
                </div>
                <div class="preview-device mobile">
                    <div class="device-label">📲 Móvil</div>
                    <div class="device-frame mobile-frame">
                        <div id="previewMobile"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="templatesModal">
        <div class="modal-content" style="position: relative; max-width: 700px;">
            <button class="modal-close" onclick="closeTemplatesModal()">×</button>
            <h2 style="margin-bottom: 20px;">📋 Gestionar Plantillas</h2>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="templateNameInput" class="property-input" 
                    placeholder="Nombre de la plantilla" style="flex: 1;">
                <button class="toolbar-btn primary" onclick="saveCurrentAsTemplate()">Guardar como Plantilla</button>
            </div>
            
            <div id="templatesList" style="max-height: 400px; overflow-y: auto;">
                <div class="loading">Cargando plantillas...</div>
            </div>
        </div>
    </div>

    <script src="static/sortablejs@1.15.7.js"></script>
    <script>
        const state = {
            page: { title: '', blocks: [], styles: { primaryColor: '#2563eb', backgroundColor: '#ffffff', textColor: '#1f2937', fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", maxWidth: '', padding: '', globalCSS: '' }, favicon: '' },
            selectedBlockId: null,
            responsiveMode: 'desktop',
            hoverMode: false
        };
        
        // Variables globales para drag and drop
        let isDraggingBlock = false;
        let draggedBlockId = null;

        const blockTemplates = {
            container: { type: 'container', direction: 'vertical', directionMobile: '', directionTablet: '', directionDesktop: '', children: [], backgroundColor: '', textColor: '', customCSS: '', widthMobile: '', heightMobile: '', widthTablet: '', heightTablet: '', widthDesktop: '', heightDesktop: '', width: '', height: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' },
            hero: { type: 'hero', content: 'Bienvenido a nuestra web', subContent: 'Descripción corta aquí', backgroundColor: '#2563eb', textColor: '#ffffff', height: '400px', customCSS: '', widthMobile: '', heightMobile: '', widthTablet: '', heightTablet: '', widthDesktop: '', heightDesktop: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' },
            paragraph: { type: 'paragraph', content: 'Este es un párrafo editable. Haz clic en el bloque para editar el contenido.', customCSS: '', widthMobile: '', heightMobile: '', widthTablet: '', heightTablet: '', widthDesktop: '', heightDesktop: '', width: '', height: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' },
            heading: { type: 'heading', level: 2, content: 'Encabezado', customCSS: '', widthMobile: '', heightMobile: '', widthTablet: '', heightTablet: '', widthDesktop: '', heightDesktop: '', width: '', height: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' },
            image: { type: 'image', src: '', alt: 'Imagen', width: '', customCSS: '', widthMobile: '', heightMobile: '', widthTablet: '', heightTablet: '', widthDesktop: '', heightDesktop: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' },
            icon: { type: 'icon', emoji: '😀', fontSize: '48', color: '#2563eb', customCSS: '', fontSizeTablet: '', fontSizeMobile: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' },
            cards: { type: 'cards', items: [], customCSS: '', widthMobile: '', heightMobile: '', widthTablet: '', heightTablet: '', widthDesktop: '', heightDesktop: '', width: '', height: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' },
            carousel: { type: 'carousel', slides: [], customCSS: '', widthMobile: '', heightMobile: '', widthTablet: '', heightTablet: '', widthDesktop: '', heightDesktop: '', width: '', height: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' },
            button: { type: 'button', text: 'Click aquí', link: '#', backgroundColor: '#2563eb', textColor: '#ffffff', customCSS: '', widthMobile: '', heightMobile: '', widthTablet: '', heightTablet: '', widthDesktop: '', heightDesktop: '', width: '', height: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' },
            divider: { type: 'divider', borderColor: '#e5e7eb', customCSS: '', widthMobile: '', heightMobile: '', widthTablet: '', heightTablet: '', widthDesktop: '', heightDesktop: '', width: '', height: '', hiddenMobile: false, hiddenTablet: false, hiddenDesktop: false, hoverBackgroundColor: '', hoverTextColor: '', paddingTop: '', paddingRight: '', paddingBottom: '', paddingLeft: '', paddingTopTablet: '', paddingRightTablet: '', paddingBottomTablet: '', paddingLeftTablet: '', paddingTopMobile: '', paddingRightMobile: '', paddingBottomMobile: '', paddingLeftMobile: '' }
        };

        document.addEventListener('DOMContentLoaded', initializeEditor);

        function initializeEditor() {
            loadPageData();
            setupDragAndDrop();
            setupEventListeners();
            setResponsiveMode('desktop');
        }

        function loadPageData() {
            fetch('/api/page').then(res => {
                if (res.status === 404) {
                    // No hay página guardada, usar valores por defecto
                    console.log('Nueva página - no hay datos guardados');
                    loadGlobalStyles();
                    renderBlocks();
                    return;
                }
                return res.json();
            }).then(data => {
                if (data && data.title) {
                    // Inicializar propiedades faltantes en los bloques
                    const blocks = data.blocks || [];
                    blocks.forEach(block => {
                        // Inicializar padding si no existe
                        if (block.paddingTop === undefined) block.paddingTop = '';
                        if (block.paddingRight === undefined) block.paddingRight = '';
                        if (block.paddingBottom === undefined) block.paddingBottom = '';
                        if (block.paddingLeft === undefined) block.paddingLeft = '';
                        if (block.paddingTopTablet === undefined) block.paddingTopTablet = '';
                        if (block.paddingRightTablet === undefined) block.paddingRightTablet = '';
                        if (block.paddingBottomTablet === undefined) block.paddingBottomTablet = '';
                        if (block.paddingLeftTablet === undefined) block.paddingLeftTablet = '';
                        if (block.paddingTopMobile === undefined) block.paddingTopMobile = '';
                        if (block.paddingRightMobile === undefined) block.paddingRightMobile = '';
                        if (block.paddingBottomMobile === undefined) block.paddingBottomMobile = '';
                        if (block.paddingLeftMobile === undefined) block.paddingLeftMobile = '';
                        // Inicializar hover si no existe
                        if (block.hoverBackgroundColor === undefined) block.hoverBackgroundColor = '';
                        if (block.hoverTextColor === undefined) block.hoverTextColor = '';
                    });

                    state.page = { title: data.title, blocks: blocks, styles: data.styles || state.page.styles, favicon: data.favicon || '' };
                    document.getElementById('siteTitle').value = data.title;
                    if (data.favicon) {
                        const link = document.querySelector('link[rel="icon"]') || document.createElement('link');
                        link.rel = 'icon';
                        link.href = data.favicon;
                        document.head.appendChild(link);
                        // Mostrar vista previa del favicon
                        const preview = document.getElementById('faviconPreview');
                        preview.src = data.favicon;
                        preview.style.display = 'block';
                    }
                    loadGlobalStyles();
                    renderBlocks();
                    showToast('Página cargada', 'success');
                }
            }).catch(err => {
                console.log('Nueva página - error al cargar:', err);
            });
        }

        function updateSiteTitle(value) {
            state.page.title = value;
        }

        function updateSiteFavicon(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.page.favicon = e.target.result;
                    const link = document.querySelector('link[rel="icon"]') || document.createElement('link');
                    link.rel = 'icon';
                    link.href = e.target.result;
                    document.head.appendChild(link);
                    // Mostrar vista previa
                    const preview = document.getElementById('faviconPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function loadGlobalStyles() {
            const styles = state.page.styles;
            document.getElementById('primaryColor').value = styles.primaryColor || '#2563eb';
            document.getElementById('primaryColorText').value = styles.primaryColor || '#2563eb';
            document.getElementById('backgroundColor').value = styles.backgroundColor || '#ffffff';
            document.getElementById('backgroundColorText').value = styles.backgroundColor || '#ffffff';
            document.getElementById('textColor').value = styles.textColor || '#1f2937';
            document.getElementById('textColorText').value = styles.textColor || '#1f2937';
            document.getElementById('fontFamily').value = styles.fontFamily || "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
            document.getElementById('maxWidth').value = styles.maxWidth || '';
            document.getElementById('padding').value = styles.padding || '';
            document.getElementById('globalCSS').value = styles.globalCSS || '';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + 'Panel').classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
        }

        function updateGlobalStyle(prop, value) {
            state.page.styles[prop] = value;
            if (prop === 'primaryColor') { document.getElementById('primaryColorText').value = value; document.getElementById('primaryColor').value = value; }
            else if (prop === 'backgroundColor') { document.getElementById('backgroundColorText').value = value; document.getElementById('backgroundColor').value = value; }
            else if (prop === 'textColor') { document.getElementById('textColorText').value = value; document.getElementById('textColor').value = value; }
        }

        function setupDragAndDrop() {
            const blocksContainer = document.getElementById('blocksContainer');
            
            // Configurar drag en los botones de la sidebar para añadir nuevos bloques
            document.querySelectorAll('.block-btn').forEach(btn => {
                btn.addEventListener('dragstart', (e) => {
                    e.dataTransfer.effectAllowed = 'copy';
                    e.dataTransfer.setData('text/plain', btn.dataset.blockType);
                    e.dataTransfer.setData('blockType', btn.dataset.blockType);
                    e.dataTransfer.setData('application/x-drag-source', 'sidebar');
                });
            });
            
            // Configurar drag en bloques existentes para moverlos a contenedores
            document.addEventListener('dragstart', (e) => {
                const block = e.target.closest('.block');
                if (block && !e.target.closest('.block-action-btn')) {
                    isDraggingBlock = true;
                    draggedBlockId = block.dataset.blockId;
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('application/x-drag-source', 'existing-block');
                    e.dataTransfer.setData('blockId', block.dataset.blockId);
                }
            });
            
            document.addEventListener('dragend', () => {
                isDraggingBlock = false;
                draggedBlockId = null;
            });
            
            // Drag over en el canvas principal (solo si no es sobre una dropzone o un bloque)
            blocksContainer.addEventListener('dragover', (e) => {
                // Si estamos sobre una dropzone de contenedor o un bloque, no hacer nada
                if (e.target.closest('.block-container-drop') || e.target.closest('.block')) {
                    return;
                }
                // Solo permitir drop desde la sidebar (no desde bloques existentes)
                const dragSource = e.dataTransfer.getData('application/x-drag-source');
                if (dragSource !== 'sidebar') {
                    return;
                }
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
                blocksContainer.style.background = 'rgba(37, 99, 235, 0.05)';
            });
            blocksContainer.addEventListener('dragleave', () => { 
                blocksContainer.style.background = ''; 
            });
            blocksContainer.addEventListener('drop', (e) => {
                // Si el drop es en una dropzone o en un bloque, no hacer nada
                if (e.target.closest('.block-container-drop') || e.target.closest('.block')) {
                    return;
                }
                // Solo procesar si es desde la sidebar
                const dragSource = e.dataTransfer.getData('application/x-drag-source');
                if (dragSource !== 'sidebar') {
                    return;
                }
                e.preventDefault();
                blocksContainer.style.background = '';
                const blockType = e.dataTransfer.getData('text/plain');
                if (blockType && blockTemplates[blockType]) {
                    addBlock(blockType);
                }
            });
        }

        function setupEventListeners() {
            document.getElementById('saveBtn').addEventListener('click', savePage);
            document.getElementById('previewBtn').addEventListener('click', openPreviewModal);
            document.getElementById('templatesBtn').addEventListener('click', openTemplatesModal);
            document.getElementById('goToWebBtn').addEventListener('click', () => { window.open('/', '_blank'); });
        }

        function setResponsiveMode(mode) {
            state.responsiveMode = mode;
            document.querySelectorAll('.responsive-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.device === mode);
            });
            const canvasWrapper = document.querySelector('.canvas-wrapper');
            canvasWrapper.classList.remove('desktop', 'tablet', 'mobile');
            canvasWrapper.classList.add(mode);
            renderBlocks();
            renderProperties();
        }

        function addBlock(type, parentId = null) {
            // Validar que el tipo es válido
            if (!type || !blockTemplates[type]) {
                console.error('Tipo de bloque no válido:', type);
                return;
            }
            
            const template = JSON.parse(JSON.stringify(blockTemplates[type]));
            template.id = Date.now();
            if (parentId) {
                const parent = findBlockById(state.page.blocks, parentId);
                if (parent && parent.type === 'container') {
                    parent.children = parent.children || [];
                    parent.children.push(template);
                }
            } else {
                state.page.blocks.push(template);
            }
            renderBlocks();
        }

        function moveBlockToContainer(blockId, parentId) {
            // Buscar el bloque y removerlo de su ubicación actual
            let blockToRemove = null;
            
            // Buscar en root level
            const rootIndex = state.page.blocks.findIndex(b => b.id === blockId);
            if (rootIndex !== -1) {
                blockToRemove = state.page.blocks.splice(rootIndex, 1)[0];
            } else {
                // Buscar en contenedores anidados
                blockToRemove = findAndRemoveBlockFromChildren(state.page.blocks, blockId);
            }
            
            if (blockToRemove) {
                // Añadir al contenedor destino
                const parent = findBlockById(state.page.blocks, parentId);
                if (parent && parent.type === 'container') {
                    parent.children = parent.children || [];
                    parent.children.push(blockToRemove);
                    renderBlocks();
                }
            }
        }

        function findAndRemoveBlockFromChildren(blocks, blockId) {
            for (const block of blocks) {
                if (block.type === 'container' && block.children) {
                    const childIndex = block.children.findIndex(b => b.id === blockId);
                    if (childIndex !== -1) {
                        return block.children.splice(childIndex, 1)[0];
                    }
                    const found = findAndRemoveBlockFromChildren(block.children, blockId);
                    if (found) return found;
                }
            }
            return null;
        }

        function renderBlocks() {
            const container = document.getElementById('blocksContainer');
            if (state.page.blocks.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Arrastra bloques aquí para comenzar</p></div>';
                return;
            }
            container.innerHTML = state.page.blocks.map(block => createBlockHTML(block)).join('');

            // Eventos para selección de bloques (solo si no se está arrastrando)
            document.querySelectorAll('.block').forEach(el => {
                el.addEventListener('click', (e) => {
                    // Si se acaba de hacer un drag, no seleccionar
                    if (draggedBlockId) {
                        e.stopPropagation();
                        return;
                    }
                    e.stopPropagation();
                    if (!e.target.closest('.block-action-btn')) {
                        selectBlock(parseInt(el.dataset.blockId));
                    }
                });
            });
            
            // Eventos para acciones de bloques
            document.querySelectorAll('.block-action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const blockId = parseInt(btn.closest('.block').dataset.blockId);
                    const action = btn.dataset.action;
                    if (action === 'delete') deleteBlock(blockId);
                    else if (action === 'duplicate') duplicateBlock(blockId);
                    else if (action === 'up') moveBlock(blockId, -1);
                    else if (action === 'down') moveBlock(blockId, 1);
                });
            });

            // Inicializar eventos para las áreas de drop de los contenedores
            document.querySelectorAll('.block-container-drop').forEach(dropZone => {
                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const dragSource = e.dataTransfer.getData('application/x-drag-source');
                    // Permitir drop desde sidebar o desde bloques existentes
                    if (dragSource !== 'sidebar' && dragSource !== 'existing-block') {
                        return;
                    }
                    e.dataTransfer.dropEffect = dragSource === 'sidebar' ? 'copy' : 'move';
                    dropZone.style.background = '#e0f2fe';
                    dropZone.style.borderColor = '#0284c7';
                });

                dropZone.addEventListener('dragleave', (e) => {
                    if (e.target === dropZone) {
                        dropZone.style.background = '#f0f9ff';
                        dropZone.style.borderColor = '#2563eb';
                    }
                });

                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const dragSource = e.dataTransfer.getData('application/x-drag-source');
                    // Solo procesar si es desde sidebar o bloque existente
                    if (dragSource !== 'sidebar' && dragSource !== 'existing-block') {
                        return;
                    }
                    dropZone.style.background = '#f0f9ff';
                    dropZone.style.borderColor = '#2563eb';

                    const parentId = parseInt(dropZone.dataset.parentId);

                    if (dragSource === 'sidebar') {
                        // Añadir nuevo bloque desde sidebar
                        const blockType = e.dataTransfer.getData('text/plain');
                        if (blockType && blockTemplates[blockType]) {
                            addBlock(blockType, parentId);
                        }
                    } else {
                        // Mover bloque existente al contenedor
                        const blockId = parseInt(e.dataTransfer.getData('blockId'));
                        if (blockId && parentId) {
                            moveBlockToContainer(blockId, parentId);
                        }
                    }
                });

                dropZone.addEventListener('click', (e) => {
                    if (e.target.closest('.block')) {
                        return;
                    }
                    e.stopPropagation();
                    const parentId = parseInt(dropZone.dataset.parentId);
                    selectBlock(parentId);
                });
            });
        }

        function createBlockHTML(block) {
            let preview = '';
            const blockClass = `block-${block.id}`;
            const cssId = `css-${block.id}`;

            // Generar estilos responsive con media queries
            const generateResponsiveCSS = () => {
                let css = '';

                // Desktop (base) - Colores base
                let baseStyles = [];
                if (block.backgroundColor) baseStyles.push(`background: ${block.backgroundColor}`);
                if (block.textColor) baseStyles.push(`color: ${block.textColor}`);

                if (baseStyles.length > 0) {
                    css += `.${blockClass} { ${baseStyles.join('; ')}; } `;
                }

                // Dimensiones Desktop
                let desktopStyles = [];
                if (block.widthDesktop && block.widthDesktop !== '' && block.widthDesktop !== 'auto') desktopStyles.push(`width: ${block.widthDesktop}`);
                if (block.heightDesktop && block.heightDesktop !== '' && block.heightDesktop !== 'auto') desktopStyles.push(`height: ${block.heightDesktop}`);
                if (block.width && block.width !== '' && block.width !== 'auto') desktopStyles.push(`width: ${block.width}`);
                if (block.height && block.height !== '' && block.height !== 'auto') desktopStyles.push(`height: ${block.height}`);

                if (desktopStyles.length > 0) {
                    css += `.${blockClass} { ${desktopStyles.join('; ')}; } `;
                }

                // Tablet (769px - 1024px)
                let tabletStyles = [];
                if (block.widthTablet && block.widthTablet !== '' && block.widthTablet !== 'auto') tabletStyles.push(`width: ${block.widthTablet}`);
                if (block.heightTablet && block.heightTablet !== '' && block.heightTablet !== 'auto') tabletStyles.push(`height: ${block.heightTablet}`);

                if (tabletStyles.length > 0) {
                    css += `@media (max-width: 1024px) and (min-width: 769px) { .${blockClass} { ${tabletStyles.join('; ')}; } } `;
                }

                // Mobile (<= 768px)
                let mobileStyles = [];
                if (block.widthMobile && block.widthMobile !== '' && block.widthMobile !== 'auto') mobileStyles.push(`width: ${block.widthMobile}`);
                if (block.heightMobile && block.heightMobile !== '' && block.heightMobile !== 'auto') mobileStyles.push(`height: ${block.heightMobile}`);

                if (mobileStyles.length > 0) {
                    css += `@media (max-width: 768px) { .${blockClass} { ${mobileStyles.join('; ')}; } } `;
                }

                // Hover styles (al final para tener prioridad)
                if (block.hoverBackgroundColor || block.hoverTextColor) {
                    css += `.${blockClass}:hover { `;
                    if (block.hoverBackgroundColor) css += `background: ${block.hoverBackgroundColor} !important; `;
                    if (block.hoverTextColor) css += `color: ${block.hoverTextColor} !important; `;
                    css += `} `;
                }

                // Padding Desktop (base)
                if (block.paddingTop || block.paddingRight || block.paddingBottom || block.paddingLeft) {
                    css += `.${blockClass} { padding: ${block.paddingTop || 0}px ${block.paddingRight || 0}px ${block.paddingBottom || 0}px ${block.paddingLeft || 0}px; } `;
                }

                // Padding responsive - Tablet
                const paddingTopTablet = block.paddingTopTablet || block.paddingTop;
                const paddingRightTablet = block.paddingRightTablet || block.paddingRight;
                const paddingBottomTablet = block.paddingBottomTablet || block.paddingBottom;
                const paddingLeftTablet = block.paddingLeftTablet || block.paddingLeft;
                if (paddingTopTablet || paddingRightTablet || paddingBottomTablet || paddingLeftTablet) {
                    css += `@media (max-width: 1024px) and (min-width: 769px) { .${blockClass} { padding: ${paddingTopTablet || 0}px ${paddingRightTablet || 0}px ${paddingBottomTablet || 0}px ${paddingLeftTablet || 0}px; } } `;
                }

                // Padding responsive - Mobile
                const paddingTopMobile = block.paddingTopMobile || block.paddingTop;
                const paddingRightMobile = block.paddingRightMobile || block.paddingRight;
                const paddingBottomMobile = block.paddingBottomMobile || block.paddingBottom;
                const paddingLeftMobile = block.paddingLeftMobile || block.paddingLeft;
                if (paddingTopMobile || paddingRightMobile || paddingBottomMobile || paddingLeftMobile) {
                    css += `@media (max-width: 768px) { .${blockClass} { padding: ${paddingTopMobile || 0}px ${paddingRightMobile || 0}px ${paddingBottomMobile || 0}px ${paddingLeftMobile || 0}px; } } `;
                }

                return css;
            };

            // Generar dirección responsive para contenedores
            const generateDirectionCSS = () => {
                if (block.type !== 'container') return '';

                let css = '';

                // Dirección base (desktop)
                const baseDirection = block.directionDesktop || block.direction;
                if (baseDirection) {
                    css += `.${blockClass} { display: flex; flex-direction: ${baseDirection === 'horizontal' ? 'row' : 'column'}; gap: 12px; } `;
                } else {
                    css += `.${blockClass} { display: flex; flex-direction: column; gap: 12px; } `;
                }

                // Tablet (entre 769px y 1024px)
                if (block.directionTablet) {
                    css += `@media (min-width: 769px) and (max-width: 1024px) { .${blockClass} { flex-direction: ${block.directionTablet === 'horizontal' ? 'row' : 'column'}; } } `;
                }

                // Mobile (<= 768px)
                if (block.directionMobile) {
                    css += `@media (max-width: 768px) { .${blockClass} { flex-direction: ${block.directionMobile === 'horizontal' ? 'row' : 'column'}; } } `;
                }

                return css;
            };

            const responsiveCSS = generateResponsiveCSS();
            const directionCSS = generateDirectionCSS();
            const allCSS = responsiveCSS + directionCSS;

            // Obtener dirección para el modo actual (para preview en editor)
            const getCurrentDirection = () => {
                if (block.type !== 'container') return '';
                const mode = state.responsiveMode;
                if (mode === 'mobile' && block.directionMobile) return block.directionMobile;
                if (mode === 'tablet' && block.directionTablet) return block.directionTablet;
                return block.directionDesktop || block.direction;
            };

            // Obtener si está oculto en el modo actual
            const getIsHidden = () => {
                const mode = state.responsiveMode;
                if (mode === 'mobile') return block.hiddenMobile;
                if (mode === 'tablet') return block.hiddenTablet;
                return block.hiddenDesktop;
            };

            const currentDirection = getCurrentDirection();
            const isHidden = getIsHidden();
            const directionStyle = currentDirection ? `flex-direction: ${currentDirection === 'horizontal' ? 'row' : 'column'};` : '';
            const hiddenStyle = isHidden ? 'display: none; opacity: 0.5;' : '';

            if (block.type === 'container') {
                const childrenContent = (block.children && block.children.length > 0)
                    ? block.children.map(child => createBlockHTML(child)).join('')
                    : '<div style="display: flex; align-items: center; justify-content: center; min-height: 80px; color:#94a3b8;font-size:13px; border: 2px dashed #cbd5e1; border-radius: 8px; margin: 8px;">📦 Arrastra bloques aquí</div>';

                preview = `
                    <style id="${cssId}">
                        .${blockClass} { ${block.customCSS} ${allCSS} }
                        .${blockClass} .block-container-drop {
                            border: 2px dashed #2563eb !important;
                            margin-bottom: 8px;
                            background: #f0f9ff !important;
                            padding: 16px;
                            min-height: 100px;
                            border-radius: 8px;
                            transition: all 0.2s;
                        }
                        .${blockClass} .block-container-drop:hover {
                            background: #e0f2fe !important;
                            border-color: #0284c7 !important;
                        }
                        ${isHidden ? `.${blockClass} { display: none !important; }` : ''}
                    </style>
                    <div class="${blockClass} block-container-drop" data-parent-id="${block.id}" style="min-height:100px; margin-bottom: 8px; padding: 16px; display: flex; flex-wrap: wrap; ${directionStyle} gap: 12px; ${hiddenStyle}">${childrenContent}</div>`;
            } else {
                switch (block.type) {
                    case 'hero':
                        preview = `<style id="${cssId}">.${blockClass} { ${block.customCSS} ${allCSS} background: ${block.backgroundColor || 'transparent'}; color: ${block.textColor || '#1f2937'}; }</style><div class="${blockClass}" style="padding: 20px; border-radius: 4px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;"><h1 style="font-size: 28px; margin-bottom: 10px;">${block.content}</h1><p>${block.subContent}</p></div>`;
                        break;
                    case 'heading':
                        preview = `<style id="${cssId}">.${blockClass} { ${block.customCSS} ${allCSS} color: ${block.textColor || '#1f2937'}; }</style><h2 class="${blockClass}" style="margin: 16px 0;">${block.content}</h2>`;
                        break;
                    case 'paragraph':
                        preview = `<style id="${cssId}">.${blockClass} { ${block.customCSS} ${allCSS} color: ${block.textColor || '#1f2937'}; }</style><p class="${blockClass}" style="line-height: 1.6; margin: 12px 0;">${block.content}</p>`;
                        break;
                    case 'image':
                        preview = block.src ? `<style id="${cssId}">.${blockClass} { ${block.customCSS} ${allCSS} }</style><img class="${blockClass}" src="${block.src}" alt="${block.alt}" style="border-radius: 4px; max-width: 100%;">` : `<style id="${cssId}">.${blockClass} { ${block.customCSS} ${allCSS} }</style><div class="${blockClass}" style="background: var(--secondary); padding: 40px; text-align: center; border-radius: 4px; color: var(--text-secondary);">Sin imagen</div>`;
                        break;
                    case 'icon':
                        // Para iconos, usamos fontSize del modo actual
                        const mode = state.responsiveMode;
                        const fontSizeProp = mode === 'desktop' ? 'fontSize' : `fontSize${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
                        const iconSize = block[fontSizeProp] || block.fontSize || '48';
                        const iconColor = block.color || '#2563eb';
                        // No usamos allCSS porque contiene width/height que no queremos
                        let iconCSS = `${block.customCSS || ''}`;
                        // Añadir padding si existe
                        if (block.paddingTop || block.paddingRight || block.paddingBottom || block.paddingLeft) {
                            iconCSS += ` padding: ${block.paddingTop || 0}px ${block.paddingRight || 0}px ${block.paddingBottom || 0}px ${block.paddingLeft || 0}px;`;
                        }
                        // Añadir padding responsive tablet
                        if (block.paddingTopTablet || block.paddingRightTablet || block.paddingBottomTablet || block.paddingLeftTablet) {
                            const pt = block.paddingTopTablet || block.paddingTop || '0';
                            const pr = block.paddingRightTablet || block.paddingRight || '0';
                            const pb = block.paddingBottomTablet || block.paddingBottom || '0';
                            const pl = block.paddingLeftTablet || block.paddingLeft || '0';
                            iconCSS += ` @media (max-width: 1024px) and (min-width: 769px) { .${blockClass} { padding: ${pt}px ${pr}px ${pb}px ${pl}px; } }`;
                        }
                        // Añadir padding responsive mobile
                        if (block.paddingTopMobile || block.paddingRightMobile || block.paddingBottomMobile || block.paddingLeftMobile) {
                            const pt = block.paddingTopMobile || block.paddingTop || '0';
                            const pr = block.paddingRightMobile || block.paddingRight || '0';
                            const pb = block.paddingBottomMobile || block.paddingBottom || '0';
                            const pl = block.paddingLeftMobile || block.paddingLeft || '0';
                            iconCSS += ` @media (max-width: 768px) { .${blockClass} { padding: ${pt}px ${pr}px ${pb}px ${pl}px; } }`;
                        }
                        preview = `<style id="${cssId}">.${blockClass} { ${iconCSS} font-size: ${iconSize}px !important; color: ${iconColor} !important; display: inline-block !important; } </style><span class="${blockClass}">${block.emoji || '😀'}</span>`;
                        break;
                    case 'cards':
                        preview = `<style id="${cssId}">.${blockClass} { ${block.customCSS} ${allCSS} }</style><div class="${blockClass}" style="display: grid; grid-template-columns: repeat(${Math.min(block.items.length, 3)}, 1fr); gap: 12px;">${block.items.map(item => `<div style="border: 1px solid var(--border); padding: 12px; border-radius: 4px;"><h3 style="margin-bottom: 4px; font-size: 14px;">${item.title}</h3><p style="font-size: 12px; color: var(--text-secondary);">${item.description}</p></div>`).join('')}</div>`;
                        break;
                    case 'carousel':
                        preview = `<style id="${cssId}">.${blockClass} { ${block.customCSS} ${allCSS} }</style><div class="${blockClass}" style="background: var(--secondary); padding: 20px; border-radius: 4px; text-align: center;">Carrusel (${block.slides.length} slides)</div>`;
                        break;
                    case 'button':
                        preview = `<style id="${cssId}">.${blockClass} { ${block.customCSS} ${allCSS} background: ${block.backgroundColor || 'transparent'}; color: ${block.textColor || '#ffffff'}; }</style><button class="${blockClass}" style="padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500;">${block.text}</button>`;
                        break;
                    case 'divider':
                        preview = `<style id="${cssId}">.${blockClass} { ${block.customCSS} ${allCSS} }</style><hr class="${blockClass}" style="border: none; border-top: 1px solid ${block.borderColor || 'transparent'}; margin: 20px 0; background: ${block.borderColor || 'transparent'};">`;
                        break;
                }
            }
            return `<div class="block ${state.selectedBlockId === block.id ? 'selected' : ''}" data-block-id="${block.id}" data-block-type="${block.type}" draggable="true"><div class="block-header"><span class="block-type">${block.type}</span><div class="block-actions"><button class="block-action-btn" data-action="up" title="Subir">↑</button><button class="block-action-btn" data-action="down" title="Bajar">↓</button><button class="block-action-btn" data-action="duplicate" title="Duplicar">⎘</button><button class="block-action-btn danger" data-action="delete" title="Eliminar">🗑️</button></div></div><div style="margin-top: 12px;">${preview}</div></div>`;
        }

        function selectBlock(blockId) {
            state.selectedBlockId = blockId;
            renderBlocks();
            renderProperties();
        }

        function deleteBlock(blockId) {
            const idx = state.page.blocks.findIndex(b => b.id === blockId);
            if (idx !== -1) {
                state.page.blocks.splice(idx, 1);
                if (state.selectedBlockId === blockId) state.selectedBlockId = null;
                renderBlocks();
                renderProperties();
                return;
            }

            deleteBlockFromChildren(state.page.blocks, blockId);
            if (state.selectedBlockId === blockId) state.selectedBlockId = null;
            renderBlocks();
            renderProperties();
        }

        function deleteBlockFromChildren(blocks, blockId) {
            for (const block of blocks) {
                if (block.type === 'container' && block.children) {
                    const childIdx = block.children.findIndex(b => b.id === blockId);
                    if (childIdx !== -1) {
                        block.children.splice(childIdx, 1);
                        return true;
                    }
                    if (deleteBlockFromChildren(block.children, blockId)) return true;
                }
            }
            return false;
        }

        function duplicateBlock(blockId) {
            const idx = state.page.blocks.findIndex(b => b.id === blockId);
            if (idx !== -1) {
                const block = state.page.blocks[idx];
                const copy = JSON.parse(JSON.stringify(block));
                copy.id = Date.now();
                state.page.blocks.splice(idx + 1, 0, copy);
                renderBlocks();
                return;
            }

            duplicateBlockFromChildren(state.page.blocks, blockId);
            renderBlocks();
        }

        function duplicateBlockFromChildren(blocks, blockId) {
            for (const block of blocks) {
                if (block.type === 'container' && block.children) {
                    const childIdx = block.children.findIndex(b => b.id === blockId);
                    if (childIdx !== -1) {
                        const copy = JSON.parse(JSON.stringify(block.children[childIdx]));
                        copy.id = Date.now();
                        block.children.splice(childIdx + 1, 0, copy);
                        return true;
                    }
                    if (duplicateBlockFromChildren(block.children, blockId)) return true;
                }
            }
            return false;
        }

        function moveBlock(blockId, direction) {
            const idx = state.page.blocks.findIndex(b => b.id === blockId);
            const newIdx = idx + direction;
            if (idx !== -1 && newIdx >= 0 && newIdx < state.page.blocks.length) {
                [state.page.blocks[idx], state.page.blocks[newIdx]] = [state.page.blocks[newIdx], state.page.blocks[idx]];
                renderBlocks();
                renderProperties();
                return;
            }

            moveBlockFromChildren(state.page.blocks, blockId, direction);
            renderBlocks();
            renderProperties();
        }

        function moveBlockFromChildren(blocks, blockId, direction) {
            for (const block of blocks) {
                if (block.type === 'container' && block.children) {
                    const childIdx = block.children.findIndex(b => b.id === blockId);
                    if (childIdx !== -1) {
                        const newIdx = childIdx + direction;
                        if (newIdx >= 0 && newIdx < block.children.length) {
                            [block.children[childIdx], block.children[newIdx]] = [block.children[newIdx], block.children[childIdx]];
                            return true;
                        }
                    }
                    if (moveBlockFromChildren(block.children, blockId, direction)) return true;
                }
            }
            return false;
        }

        function renderProperties() {
            const panel = document.getElementById('propertiesPanel');
            if (!state.selectedBlockId) {
                panel.innerHTML = '<p style="color: var(--text-secondary); font-size: 13px;">Selecciona un bloque para editar</p>';
                return;
            }
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (!block) return;
            let html = `<div class="property-group"><label class="property-label">Tipo de Bloque</label><input type="text" value="${block.type}" disabled class="property-input" style="background: var(--secondary);"></div>`;

            // Añadir propiedades de dimensiones para todos los bloques
            if (block.type !== 'icon') {
                html += createDimensionProperties(block);
            }

            // Añadir propiedades de padding para todos los bloques
            html += createPaddingProperties(block);

            switch (block.type) {
                case 'container':
                    html += `<div class="property-group">
                        <label class="property-label">Dirección base (Ordenador)</label>
                        <select class="property-select" onchange="updateBlockProperty('direction', this.value)">
                            <option value="vertical" ${block.direction === 'vertical' ? 'selected' : ''}>Vertical</option>
                            <option value="horizontal" ${block.direction === 'horizontal' ? 'selected' : ''}>Horizontal</option>
                        </select>
                    </div>
                    <div class="property-group">
                        <label style="display: flex; align-items: center; justify-content: space-between;">
                            <span class="property-label" style="margin: 0;">Estado Hover</span>
                            <label style="display: flex; align-items: center; cursor: pointer;">
                                <input type="checkbox" ${state.hoverMode ? 'checked' : ''} onchange="toggleHoverMode()" style="width: 36px; height: 20px; margin-right: 8px;">
                                <span style="font-size: 11px; color: var(--text-secondary);">${state.hoverMode ? 'ON' : 'OFF'}</span>
                            </label>
                        </label>
                    </div>
                    <div class="property-group">
                        <label class="property-label">Color de Fondo ${state.hoverMode ? '(Hover)' : ''}</label>
                        <div class="color-input">
                            <input type="color" value="${state.hoverMode ? (block.hoverBackgroundColor || '#ffffff') : (block.backgroundColor || '#ffffff')}" onchange="updateColorProperty('backgroundColor', this.value)">
                            <input type="text" value="${state.hoverMode ? (block.hoverBackgroundColor || '#ffffff') : (block.backgroundColor || '#ffffff')}" class="property-input" onchange="updateColorProperty('backgroundColor', this.value)">
                        </div>
                    </div>
                    <div class="property-group">
                        <label class="property-label">Color de Texto ${state.hoverMode ? '(Hover)' : ''}</label>
                        <div class="color-input">
                            <input type="color" value="${state.hoverMode ? (block.hoverTextColor || '#1f2937') : (block.textColor || '#1f2937')}" onchange="updateColorProperty('textColor', this.value)">
                            <input type="text" value="${state.hoverMode ? (block.hoverTextColor || '#1f2937') : (block.textColor || '#1f2937')}" class="property-input" onchange="updateColorProperty('textColor', this.value)">
                        </div>
                    </div>`;
                    break;
                case 'hero':
                    html += `<div class="property-group"><label class="property-label">Título</label><input type="text" value="${block.content}" class="property-input" onchange="updateBlockProperty('content', this.value)"></div><div class="property-group"><label class="property-label">Subtítulo</label><input type="text" value="${block.subContent}" class="property-input" onchange="updateBlockProperty('subContent', this.value)"></div><div class="property-group"><label class="property-label">Color de Fondo</label><div class="color-input"><input type="color" value="${block.backgroundColor}" onchange="updateBlockProperty('backgroundColor', this.value)"><input type="text" value="${block.backgroundColor}" class="property-input" onchange="updateBlockProperty('backgroundColor', this.value)"></div></div><div class="property-group"><label class="property-label">Color de Texto</label><div class="color-input"><input type="color" value="${block.textColor}" onchange="updateBlockProperty('textColor', this.value)"><input type="text" value="${block.textColor}" class="property-input" onchange="updateBlockProperty('textColor', this.value)"></div></div>`;
                    break;
                case 'paragraph':
                    html += `<div class="property-group"><label class="property-label">Contenido</label><textarea class="property-textarea" onchange="updateBlockProperty('content', this.value)">${block.content}</textarea></div>`;
                    break;
                case 'heading':
                    html += `<div class="property-group"><label class="property-label">Contenido</label><input type="text" value="${block.content}" class="property-input" onchange="updateBlockProperty('content', this.value)"></div><div class="property-group"><label class="property-label">Nivel</label><select class="property-select" onchange="updateBlockProperty('level', this.value)"><option value="1" ${block.level === 1 ? 'selected' : ''}>H1</option><option value="2" ${block.level === 2 ? 'selected' : ''}>H2</option><option value="3" ${block.level === 3 ? 'selected' : ''}>H3</option><option value="4" ${block.level === 4 ? 'selected' : ''}>H4</option></select></div>`;
                    break;
                case 'image':
                    html += `<div class="property-group">
                        <label class="property-label">Imagen</label>
                        <div style="margin-bottom: 8px;">
                            <input type="file" accept="image/*" onchange="handleImageUpload(event)" style="width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px;">
                        </div>
                        ${block.src ? `<img src="${block.src}" style="width: 100%; height: 120px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); margin-top: 8px;">` : '<div style="background: var(--secondary); height: 120px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 12px;">Sin imagen</div>'}
                    </div>
                    <div class="property-group">
                        <label class="property-label">URL de Imagen</label>
                        <input type="text" value="${block.src}" class="property-input" placeholder="https://ejemplo.com/imagen.jpg" onchange="updateBlockProperty('src', this.value)">
                    </div>
                    <div class="property-group">
                        <label class="property-label">Alt Text</label>
                        <input type="text" value="${block.alt}" class="property-input" onchange="updateBlockProperty('alt', this.value)">
                    </div>`;

        function createDimensionProperties(block) {
            const mode = state.responsiveMode;
            const widthProp = `width${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            const heightProp = `height${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            const directionProp = `direction${mode.charAt(0).toUpperCase() + mode.slice(1)}`;

            // Parsear width y height para extraer valor y unidad
            const parseDimension = (value) => {
                if (!value || value === '') return { value: '', unit: 'px' };
                if (value === 'auto') return { value: '', unit: 'auto' };
                const match = value.match(/^(\d*\.?\d*)(px|rem|em|vh|vw|%)?$/);
                if (match) {
                    return { value: match[1] || '', unit: match[2] || 'px' };
                }
                return { value: value, unit: 'px' };
            };

            const widthParsed = parseDimension(block[widthProp]);
            const heightParsed = parseDimension(block[heightProp]);
            const currentDirection = block[directionProp] || (mode === 'desktop' ? block.direction : '');
            const hiddenProp = `hidden${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            const isHidden = block[hiddenProp] || false;

            let html = `<div class="property-group">
                <label class="property-label">Dimensiones - ${mode === 'desktop' ? '🖥️ Ordenador' : mode === 'tablet' ? '📱 Tablet' : '📲 Móvil'}</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div>
                        <label style="font-size: 11px; color: var(--text-secondary);">Ancho</label>
                        <div style="display: flex; gap: 4px;">
                            <input type="number" value="${widthParsed.value}"
                                class="property-input"
                                style="width: 70px;"
                                onchange="updateResponsiveDimension('width', this.value, document.getElementById('widthUnit').value)">
                            <select id="widthUnit"
                                class="property-select"
                                style="width: 65px; font-size: 12px;"
                                onchange="updateResponsiveDimension('width', document.getElementById('widthValue').value, this.value)">
                                <option value="px" ${widthParsed.unit === 'px' ? 'selected' : ''}>px</option>
                                <option value="%" ${widthParsed.unit === '%' ? 'selected' : ''}>%</option>
                                <option value="rem" ${widthParsed.unit === 'rem' ? 'selected' : ''}>rem</option>
                                <option value="em" ${widthParsed.unit === 'em' ? 'selected' : ''}>em</option>
                                <option value="vh" ${widthParsed.unit === 'vh' ? 'selected' : ''}>vh</option>
                                <option value="vw" ${widthParsed.unit === 'vw' ? 'selected' : ''}>vw</option>
                                <option value="auto" ${widthParsed.unit === 'auto' ? 'selected' : ''}>auto</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-secondary);">Alto</label>
                        <div style="display: flex; gap: 4px;">
                            <input type="number" value="${heightParsed.value}"
                                class="property-input"
                                style="width: 70px;"
                                onchange="updateResponsiveDimension('height', this.value, document.getElementById('heightUnit').value)">
                            <select id="heightUnit"
                                class="property-select"
                                style="width: 65px; font-size: 12px;"
                                onchange="updateResponsiveDimension('height', document.getElementById('heightValue').value, this.value)">
                                <option value="px" ${heightParsed.unit === 'px' ? 'selected' : ''}>px</option>
                                <option value="%" ${heightParsed.unit === '%' ? 'selected' : ''}>%</option>
                                <option value="rem" ${heightParsed.unit === 'rem' ? 'selected' : ''}>rem</option>
                                <option value="em" ${heightParsed.unit === 'em' ? 'selected' : ''}>em</option>
                                <option value="vh" ${heightParsed.unit === 'vh' ? 'selected' : ''}>vh</option>
                                <option value="vw" ${heightParsed.unit === 'vw' ? 'selected' : ''}>vw</option>
                                <option value="auto" ${heightParsed.unit === 'auto' ? 'selected' : ''}>auto</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="property-group" style="margin-top: 12px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" ${isHidden ? 'checked' : ''} onchange="updateHiddenProperty(this.checked)" style="width: 16px; height: 16px;">
                    <span style="font-size: 12px; color: var(--text-primary);">Ocultar en ${mode === 'desktop' ? 'Ordenador' : mode === 'tablet' ? 'Tablet' : 'Móvil'}</span>
                </label>
                <p style="font-size:11px;color:var(--text-secondary);margin-top:8px;">Usa los iconos de arriba para cambiar de dispositivo</p>
            </div>`;

            // Añadir dirección solo para contenedores
            if (block.type === 'container') {
                html += `<div class="property-group">
                    <label class="property-label">Dirección - ${mode === 'desktop' ? '🖥️ Ordenador' : mode === 'tablet' ? '📱 Tablet' : '📲 Móvil'}</label>
                    <select class="property-select" onchange="updateResponsiveDirection(this.value)">
                        <option value="" ${currentDirection === '' ? 'selected' : ''}>${mode === 'desktop' ? 'Igual que base' : 'Heredar'}</option>
                        <option value="vertical" ${currentDirection === 'vertical' ? 'selected' : ''}>Vertical</option>
                        <option value="horizontal" ${currentDirection === 'horizontal' ? 'selected' : ''}>Horizontal</option>
                    </select>
                </div>`;
            }

            return html;
        }

        function updateResponsiveDimension(prop, value, unit) {
            const mode = state.responsiveMode;
            const propProp = `${prop}${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block) {
                if (unit === 'auto') {
                    block[propProp] = 'auto';
                } else if (value === '' || value === null || value === undefined) {
                    block[propProp] = '';
                } else {
                    block[propProp] = value + unit;
                }
                renderBlocks();
            }
        }

        function updateResponsiveDirection(value) {
            const mode = state.responsiveMode;
            const prop = `direction${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            const block = findBlockById(state.page.blocks, state.selectedBlockId);
            if (block && block.type === 'container') {
                block[prop] = value;
                renderBlocks();
                renderProperties();
            }
        }

            let html = `<div class="property-group">
