<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Primer Usuario - GoPress CMS</title>
    <link rel="stylesheet" href="static/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }

        .setup-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .setup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .setup-header h1 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .setup-header p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-group .hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .setup-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .setup-btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .setup-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
            padding: 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .info-box strong {
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-header">
            <h1>⚙️ Configuración Inicial</h1>
            <p>Crea el primer usuario para acceder al CMS</p>
        </div>

        <div class="info-box">
            <strong>📌 Importante:</strong>
            Este será el único usuario del sistema. Guarda bien tus credenciales.
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="setupForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required minlength="3" placeholder="Elige un usuario">
                <div class="hint">Mínimo 3 caracteres</div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Elige una contraseña">
                <div class="hint">Mínimo 6 caracteres</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repite la contraseña">
            </div>

            <button type="submit" class="setup-btn" id="setupBtn">Crear Usuario y Acceder</button>
        </form>
    </div>

    <script>
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const setupBtn = document.getElementById('setupBtn');
            const errorMessage = document.getElementById('errorMessage');

            // Validate passwords match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Las contraseñas no coinciden';
                errorMessage.classList.add('show');
                return;
            }

            setupBtn.disabled = true;
            setupBtn.textContent = 'Creando usuario...';
            errorMessage.classList.remove('show');

            try {
                const response = await fetch('/api/first-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // User created successfully, redirect to CMS
                    window.location.href = '/cms';
                } else {
                    errorMessage.textContent = data.error || 'Error al crear usuario';
                    errorMessage.classList.add('show');
                    setupBtn.disabled = false;
                    setupBtn.textContent = 'Crear Usuario y Acceder';
                }
            } catch (error) {
                errorMessage.textContent = 'Error de conexión. Inténtalo de nuevo.';
                errorMessage.classList.add('show');
                setupBtn.disabled = false;
                setupBtn.textContent = 'Crear Usuario y Acceder';
            }
        });

        // Check if users already exist using the dedicated endpoint
        // Only redirect if users exist and we're not in the middle of setup
        fetch('/api/auth/needs-setup')
            .then(res => {
                if (!res.ok) {
                    console.log('Error en needs-setup:', res.status);
                    return { needsSetup: true };
                }
                return res.json();
            })
            .then(data => {
                console.log('needsSetup:', data.needsSetup);
                if (!data.needsSetup) {
                    // Users already exist, redirect to CMS
                    window.location.href = '/cms';
                }
                // If needsSetup is true, stay on this page
            })
            .catch(err => {
                console.log('Error checking setup status:', err);
                // On error, stay on this page (assume setup is needed)
            });
    </script>
</body>
</html>
